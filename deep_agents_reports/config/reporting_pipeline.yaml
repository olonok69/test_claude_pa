# Reporting Pipeline Configuration
# This file contains profiles for both pre-show (personal_agendas) and post-show (post_analysis) reports
# Usage: python reporting_pipeline.py --profile <profile_name>

# =============================================================================
# PRE-SHOW REPORTS (personal_agendas mode)
# =============================================================================

lva2025:
  event: "lva"
  year: 2025
  mode: "personal_agendas"
  report_type: "pre_show"

  neo4j_env: "prod"     

  # Phase 1 settings
  config_path: "config/config_vet_lva.yaml"
  prompt_template: "reports/prompts/prompt_initial_run_generic.md"
  neo4j_profile: "prod"
  neo4j_database: "neo4j"
  provider_phase1: "anthropic"
  model_phase1: "claude-haiku-4-5"
  temperature_phase1: 0.1
  max_tokens_phase1: 9000
  example_report: "reports/report_lva_07112025.md"

  # Phase 2 enrichment
  enable_enrichment: true
  provider_phase2: "anthropic"
  model_phase2: "claude-sonnet-4-5"
  temperature_phase2: 0.1
  max_tokens_phase2: 14000

