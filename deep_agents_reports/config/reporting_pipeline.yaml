  prompt_template: "reports/prompts/prompt_post_show_generic.md"
  neo4j_profile: "prod"
  neo4j_database: "neo4j"
  provider_phase1: "anthropic"
  model_phase1: "claude-sonnet-4-5"  # Use more capable model for post-analysis
  temperature_phase1: 0.1
  max_tokens_phase1: 12000  # Higher token limit for comprehensive analysis

  # Reference to pre-show report for comparison
  pre_show_report: "reports/report_lva_07112025.md"
